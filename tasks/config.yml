---
###############################################################################
# UFW Config
###############################################################################
# Switching between IPv4 and IPv6 support requires explicitly disabling and
# then re-enabling the firewall, not just reloading, in Trixie+.
#
# Reference:
# * /etc/default/ufw

- name: 'Config | cmd | query IPv6 support'
  ansible.builtin.command: 'sysctl --values net.ipv6.conf.all.disable_ipv6'
  register: ufw__ipv6
  changed_when: false

- name: 'Config | enable'
  when: ufw_srv_enable
  block:
    - name: 'Config | filesystem | /etc/default/ufw (disable IPv6 support)'
      when: ufw__ipv6.stdout | int == 1
      ansible.builtin.lineinfile:
        path: '/etc/default/ufw'
        regexp: '^IPV6=yes'
        line: 'IPV6=no'
        state: 'present'
      register: ufw__config

    - name: 'Config | filesystem | /etc/default/ufw (enable IPv6 support)'
      when: ufw__ipv6.stdout | int == 0
      ansible.builtin.lineinfile:
        path: '/etc/default/ufw'
        regexp: '^IPV6=no'
        line: 'IPV6=yes'
        state: 'present'
      register: ufw__config

    - name: 'Config | UFW | reload for IP support changes'
      when: ufw__config.changed  # noqa no-handler execute immediately.
      block:
        - name: 'Config | UFW | disable for IP support changes'
          community.general.ufw:
            state: 'disabled'

        - name: 'Config | UFW | enable for IP support changes'
          community.general.ufw:
            state: 'enabled'

    - name: 'Config | UFW | purge existing configuration'
      when: ufw_srv_purge
      community.general.ufw:
        state: 'reset'

    - name: 'Config | UFW | disable for setup'
      when: ufw_srv_disable_for_setup
      community.general.ufw:
        state: 'disabled'
      changed_when: false

    - name: 'Config | UFW | set global logging'
      community.general.ufw:
        logging: '{{ ufw_srv_logging | default(false) }}'

    - name: 'Config | UFW | default allow outgoing connections'
      community.general.ufw:
        default: '{{ ufw_srv_default_outgoing | default("allow") }}'
        direction: 'outgoing'

    - name: 'Config | UFW | default deny incoming connections'
      community.general.ufw:
        default: '{{ ufw_srv_default_incoming | default("deny") }}'
        direction: 'incoming'

    - name: 'Config | UFW | set group rules'
      when: ufw_cfg_group | length > 0
      community.general.ufw:
        direction: '{% if "direction" in item %}{{ item.direction }}{% else %}in{% endif %}'  # yamllint disable-line rule:line-length
        from_ip: '{% if "from_ip" in item %}{{ item.from_ip }}{% else %}any{% endif %}'  # yamllint disable-line rule:line-length
        from_port:
          '{% if "from_port" in item %}{{ item.from_port }}{% endif %}'
        to_ip:
          '{% if "to_ip" in item %}{{ item.to_ip }}{% else %}any{% endif %}'
        to_port: '{% if "to_port" in item %}{{ item.to_port }}{% endif %}'
        proto:
          '{% if "proto" in item %}{{ item.proto }}{% else %}tcp{% endif %}'
        log: '{% if "log" in item %}{{ item.log }}{% else %}false{% endif %}'
        comment: '{% if "comment" in item %}{{ item.comment }}{% else %}r_pufky.deb.ufw default group comment{% endif %}'  # yamllint disable-line rule:line-length
        rule: 'allow'
      loop: '{{ ufw_cfg_group }}'

    - name: 'Config | UFW | set host rules'
      when: ufw_cfg_host | length > 0
      community.general.ufw:
        direction: '{% if "direction" in item %}{{ item.direction }}{% else %}in{% endif %}'  # yamllint disable-line rule:line-length
        from_ip: '{% if "from_ip" in item %}{{ item.from_ip }}{% else %}any{% endif %}'  # yamllint disable-line rule:line-length
        from_port: '{% if "from_port" in item %}{{ item.from_port }}{% endif %}'
        to_ip:
          '{% if "to_ip" in item %}{{ item.to_ip }}{% else %}any{% endif %}'
        to_port: '{% if "to_port" in item %}{{ item.to_port }}{% endif %}'
        proto:
          '{% if "proto" in item %}{{ item.proto }}{% else %}tcp{% endif %}'
        log: '{% if "log" in item %}{{ item.log }}{% else %}false{% endif %}'
        comment: '{% if "comment" in item %}{{ item.comment }}{% else %}r_pufky.deb.ufw default host comment{% endif %}'  # yamllint disable-line rule:line-length
        rule: 'allow'
      loop: '{{ ufw_cfg_host }}'

    - name: 'Config | UFW | enable post setup'
      when: ufw_srv_disable_for_setup
      community.general.ufw:
        state: 'enabled'
      changed_when: false

- name: 'Config | disable'
  when: not ufw_srv_enable
  community.general.ufw:
    state: 'disabled'
